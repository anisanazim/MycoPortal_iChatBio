[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
addopts = -ra
markers =
    functional: end-to-end functional pipeline checks
    quality: semantic quality checks using DeepEval metrics
    llm: tests that call an LLM endpoint
    liveapi: tests that call live MycoPortal endpoints
    smoke: fast subset intended for PR validation
    negative: expected-failure validation cases
